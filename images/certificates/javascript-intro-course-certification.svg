<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Intro Course Certification</title>
  <desc id="desc">Stylized certificate preview for Joseph Potapenko.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f1df"/>
      <stop offset="48%" stop-color="#efe2bf"/>
      <stop offset="100%" stop-color="#dcc58a"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59381d"/>
      <stop offset="50%" stop-color="#a87c47"/>
      <stop offset="100%" stop-color="#4c311a"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2449"/>
      <stop offset="100%" stop-color="#3d64c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2b1f12" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="#1a1a1a"/>
  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1456" height="1056" rx="42" fill="url(#bg)" stroke="url(#frame)" stroke-width="14"/>
    <rect x="110" y="110" width="1380" height="980" rx="30" fill="none" stroke="#8b673b" stroke-width="6" stroke-dasharray="18 16" opacity="0.65"/>
  </g>

  <g opacity="0.16" stroke="#6b4f2d" stroke-width="3">
    <path d="M270 220h1060"/>
    <path d="M270 980h1060"/>
    <path d="M250 250v700"/>
    <path d="M1350 250v700"/>
  </g>

  <g transform="translate(800 180)">
    <circle r="92" fill="#efe0b7" stroke="#a77a44" stroke-width="10"/>
    <circle r="64" fill="none" stroke="#26407d" stroke-width="8"/>
    <path d="M0 -45 13 -8 53 -8 20 15 32 52 0 30 -32 52 -20 15 -53 -8 -13 -8Z" fill="#26407d"/>
  </g>

  <rect x="450" y="270" width="700" height="78" rx="39" fill="url(#ribbon)"/>
  <text x="800" y="321" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#f8f4e6" letter-spacing="6">CERTIFICATE OF COMPLETION</text>

  <text x="800" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="70" fill="#2d2415" font-weight="700">JavaScript Intro Course</text>
  <text x="800" y="548" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#2d2415" font-weight="700">Certification</text>

  <text x="800" y="650" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="30" fill="#5b4930" letter-spacing="1.5">Awarded to</text>
  <text x="800" y="742" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#1e1b16" font-weight="700">Joseph Potapenko</text>

  <path d="M350 830h900" stroke="#8d6738" stroke-width="5" opacity="0.8"/>
  <text x="800" y="890" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="31" fill="#53402a">Portfolio certificate preview</text>
  <text x="800" y="934" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="27" fill="#6b583d">Click the card to open the certificate image</text>

  <g transform="translate(335 870)" opacity="0.9">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#26407d" stroke-width="7"/>
    <path d="M0 -33 10 -8 37 -8 15 8 24 34 0 19 -24 34 -15 8 -37 -8 -10 -8Z" fill="#26407d"/>
  </g>
  <g transform="translate(1265 870)" opacity="0.9">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#26407d" stroke-width="7"/>
    <path d="M0 -33 10 -8 37 -8 15 8 24 34 0 19 -24 34 -15 8 -37 -8 -10 -8Z" fill="#26407d"/>
  </g>
</svg>
