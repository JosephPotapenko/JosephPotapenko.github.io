<footer class="footer">
  <!-- Left side buttons -->
  <button class="footer-btn" id="btnGit" type="button" aria-label="Go to GitHub" data-href="https://github.com/JosephPotapenko">
    <img src="/images/github logo.png" alt="GitHub Icon">
  </button>
  <button class="footer-btn" id="btnCodePen" type="button" aria-label="Go to CodePen" data-href="https://codepen.io/joepotap/pens/showcase">
    <img src="/images/codepen-min.png" alt="CodePen Icon">
  </button>
  <button class="footer-btn" id="btnYouTube" type="button" aria-label="Go to YouTube channel" data-href="https://www.youtube.com/@AShepherdKing">
    <img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube App Icon" style="object-fit:contain;" />
  </button>
  <!-- Spotify toggle aligned right -->
  <!-- Embed placed before toggle to enable adjacent-sibling styling -->
  <div class="spotify-embed colorful-border" id="spotifyEmbed">
    <iframe data-testid="embed-iframe" style="border-radius:12px"
      src="https://open.spotify.com/embed/playlist/2Fny8q2IsL1AH52QYvoAaZ?utm_source=generator&theme=0"
      width="100%" height="152" frameborder="0" allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
    </iframe>
  </div>
  <button class="footer-btn spotify-toggle-btn" id="spotifyToggle" aria-label="Toggle Spotify playlist">
    <img src="/images/spotify-logo.png" alt="Spotify" />
  </button>
</footer>
<div aria-hidden="true" class="page-bottom-spacer" style="height:0;"></div>
